{% extends "base.html" %}

{% block title %}{{ page.title }} · {{ config.title }}{% endblock title %}

{% block content %}
<main class="mx-auto max-w-7xl px-6 py-24">
  <section class="glass-panel rounded-3xl p-8 lg:p-10">
    <div class="max-w-3xl space-y-4">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-primary">Page</p>
      <h1 class="font-display text-4xl font-extrabold text-white md:text-5xl">{{ page.title }}</h1>
      {% if page.description %}
        <p class="text-lg text-slate-300">{{ page.description }}</p>
      {% endif %}
    </div>
  </section>
</main>
{% endblock content %}
