{% extends "base.html" %}

{% block title %}{{ section.title }} · {{ config.title }}{% endblock title %}

{% block content %}
<main class="mx-auto max-w-4xl px-6 py-16">
  <article class="prose prose-invert max-w-none">
    {% if section.title %}
    <h1>{{ section.title }}</h1>
    {% endif %}
    {{ section.content | safe }}
  </article>
</main>
{% endblock content %}
